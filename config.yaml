# =============================================================================
# config.yaml — DRLScheduler Pipeline Configuration
# =============================================================================
# Usage:
#   Full run:   snakemake --configfile config.yaml
#   Smoke test: snakemake --configfile config.smoke.yaml
# =============================================================================

# --- Slurm ---------------------------------------------------------------
executor: slurm
use-singularity: true
singularity-args: "--bind $PWD:/workspace --bind data:/workspace/data"
latency-wait: 60
jobs: 100
rerun-incomplete: true
default-resources:
  mem_mb: 8000
  runtime: 120
  slurm_partition: cpu


# --- Container ---------------------------------------------------------------
container: "DRL_env.sif"

# --- Trace -------------------------------------------------------------------
trace_name: "physical_job"         # "physical_job" | "deep_learn"

# --- Seeds -------------------------------------------------------------------
seeds: [210169, 250564, 20603, 170797, 21095]   # 5 seeds for production

# --- Algorithms --------------------------------------------------------------
algorithms:
  - "ppo"
  - "a2c"
  - "dqn"
  - "maskable_ppo"
  - "maskable_a2c"
  - "maskable_dqn"

# --- Baseline -----------------------------------------------------------------
baseline_only: False
trad_algorithms:
  # - "fcfs"
  - "lcfs"
  - "sjf"
  # - "wfp3"
  - "unicep"
  # - "f_1"
  # - "f_2"
  
# -- Allocator -----------------------------------------------------------------
allocators:
  - "best_fit"
  # - "topology_aware"
  # - "first_available"

# --- Training hyperparameters ------------------------------------------------
save_interval: 100000
total_saving: 100                  # total timesteps = save_interval * total_saving
window_size: 512
tail_size: 64
buffer_size: 1_000_000

# --- Topology ----------------------------------------------------------------
topology_file: "physical_topology.txt" # "physical" | "deep_learn"
node_file: "nodes.csv"

# --- Statistical test parameters ---------------------------------------------
alpha: 0.05

# --- Evaluation --------------------------------------------------------------
eval_deterministic: true
eval_max_steps: null               # null = full episode; integer = early stop

# --- Pareto Select -----------------------------------------------------------
pareto_metrics:
  - "avg_waiting"
  - "avg_slowdown"
  - "avg_turnaround"
  - "max_waiting"
  - "max_slowdown"
  - "cpu_utilization"

pareto_tiebreakers:
  - "avg_waiting"
  - "avg_slowdown"
  - "cpu_utilization"

# --- Visualisation -----------------------------------------------------------
visualisation:
  plots_enabled: true
  tables_enabled: true
  cd_diagrams: true
  confidence_curves: true
  bar_graphs: true
  spider_diagrams: false
  heatmaps: false




